<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UberX SpaceX Space Rides</title>
    <link rel="stylesheet" href="/csss/app.css">
    <link rel="icon" href="img/logotipo.png">
</head>

<body class="fondops2">

    <!-- Pantalla de carga -->
    <div class="loader">
        <img src="../img/loading.jpeg" alt="Pantalla de carga">
    </div>

    <div class="contenido">

        <div class="receipt">

            <!-- Encabezado -->
            <div class="receipt-header">

                <a href="payment-methods.html" class="receipt-back">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>

                <h1 class="receipt-title">Receipt</h1>

            </div>

            <!-- Tarjeta -->
            <div class="receipt-card">

                <h2 class="receipt-price">$859.50</h2>

                <p class="receipt-date">
                    Travel - 15th Oct 2024, 08:15 AM
                </p>

                <hr>

                <h3 class="receipt-subtitle">Flight Details</h3>

                <div class="receipt-flight">

                    <div class="flight-box">

                        <i class="fa-solid fa-plane-departure"></i>

                        <h4>Earth</h4>

                        <p>JFK</p>

                        <p>10:30 AM</p>

                    </div>

                    <div class="flight-center">

                        <i class="fa-solid fa-arrow-right"></i>

                    </div>

                    <div class="flight-box">

                        <i class="fa-solid fa-plane-arrival"></i>

                        <h4>Mars</h4>

                        <p>LAX</p>

                        <p>01:45 PM</p>

                    </div>

                </div>

                <hr>

                <div class="receipt-row">
                    <span>Flight Number</span>
                    <span>AN123</span>
                </div>

                <div class="receipt-row">
                    <span>Seat</span>
                    <span>24A</span>
                </div>

                <div class="receipt-row">
                    <span>Fare</span>
                    <span>$780.00</span>
                </div>

                <div class="receipt-row">
                    <span>Taxes & Fees</span>
                    <span>$79.50</span>
                </div>

                <div class="receipt-row total">
                    <span>Total</span>
                    <span>$859.50</span>
                </div>

                <hr>

                <div class="receipt-row">
                    <span>Payment Method</span>
                    <span>Amex ****5678</span>
                </div>

                <div class="receipt-row">
                    <span>Category</span>
                    <span>Travel</span>
                </div>

            </div>

            <!-- Footer -->

            <div class="receipt-footer">

                <div class="receipt-item">

                    <i class="fa-solid fa-share-nodes"></i>

                    <a href="../img/factura.pdf" target="_blank"><button>🔗</button></a>

                </div>

                <div class="receipt-item">

                    <i class="fa-solid fa-download"></i>

                    <a href="../img/" download>
                        <button>📥</button>
                    </a>

                </div>

                <div class="receipt-item">

                    <i class="fa-solid fa-tag"></i>

                    <a href="travel.html">
                        <button>☰</button>
                    </a>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
