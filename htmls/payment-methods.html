<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Methods</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="../csss/app.css">
</head>


<body class="fondops2">
    <div class="loader">
        <img src="../img/loading.jpeg" alt=" Pantalla de carga">
    </div>
    <section class="payment-panel">

        <!-- HEADER -->

        <header class="payment-header">

            <div><a href="/htmls/travel.html">
                    <p class="atras">></p>
                </a></div>

            <h1>Payment Methods</h1>

        </header>
        <!-- SEARCH -->

        <div class="payment-search">

            <i class="fa-solid fa-magnifying-glass payment-search-icon"></i>

            <input class="payment-search-input" type="search" placeholder="Search payment methods">

        </div>

        <!-- LISTA -->

        <div class="payment-list">

            <!-- TARJETA 1 -->

            <button class="payment-card">

                <div class="payment-card-left">

                    <div class="payment-logo payment-logo-visa"></div>

                    <div>

                        <h3>**** **** **** 1234</h3>

                        <p>Expires 12/25</p>

                    </div>

                </div>

                <div class="payment-card-right">

                    <span class="payment-default">
                        Default
                    </span>

                    <i class="fa-solid fa-ellipsis-vertical"></i>

                </div>

            </button>

            <!-- TARJETA 2 -->

            <button class="payment-card">

                <div class="payment-card-left">

                    <div class="payment-logo payment-logo-gray"></div>

                    <div>

                        <h3>**** **** **** 5678</h3>

                        <p>Expires 01/26</p>

                    </div>

                </div>

                <div class="payment-card-right">

                    <i class="fa-solid fa-pen payment-edit"></i>

                    <i class="fa-regular fa-trash-can payment-delete"></i>

                </div>

            </button>

            <!-- PAYPAL -->

            <button class="payment-card">

                <div class="payment-card-left">

                    <div class="payment-logo payment-logo-paypal"></div>

                    <div>

                        <h3>PayPal</h3>

                    </div>

                </div>

                <div class="payment-card-right">

                    <i class="fa-solid fa-pen payment-edit"></i>

                    <i class="fa-regular fa-trash-can payment-delete"></i>

                </div>

            </button>

        </div>

        <!-- BOTÓN -->

        <div class="payment-footer">

            <button class="payment-add-button">

                Add New Method

            </button>

        </div>

    </section>

</body>

</html>
